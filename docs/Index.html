            <header class="topbar">

                s

                        <h3>👥 Usuários</h3>
                        <p id="users">0</p>

                    <div class="card">

            <div id="confirm-modal" class="modal hidden">
                <div class="modal-content">
                    <h3>Tem certeza?</h3>

                    <div id="delete-preview" class="delete-preview"></div>

                    <div class="modal-buttons">

                </div>
